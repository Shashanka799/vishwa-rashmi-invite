<!DOCTYPE html>
<html>
<head>
    
<meta charset="UTF-8">
<title>Engagement Invitation</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ffe0ec,#fff);
overflow-x:hidden;
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* PETALS */
.petal{
position:fixed;
top:-10px;
width:20px;
height:20px;
background:pink;
border-radius:50% 50% 50% 0;
opacity:.7;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

.main{
width:100%;
padding:20px;
}

/* FORM */
.form-box{
background:white;
display:inline-block;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
max-width:420px;
width:90%;
}

input{
padding:12px;
margin:10px 0;
width:90%;
max-width:260px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff4d6d,#ff758f);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px pink;
}

/* CARD */
.card{
display:none;
margin:auto;
max-width:420px;
width:90%;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.3);
animation:zoom 1s ease forwards;
}

@keyframes zoom{
from{transform:scale(.4);opacity:0}
to{transform:scale(1);opacity:1}
}

/* TEXT */
h1{color:#e63946;font-size:26px;}
h2{color:#444;font-size:20px;}
h3{font-size:20px;}
p{color:#555;font-size:16px;}

/* MOBILE FIX */
@media(max-width:600px){

body{
padding:15px;
align-items:center;
}

h1{font-size:22px;}
h2{font-size:18px;}
h3{font-size:18px;}
p{font-size:15px;}

button{
width:100%;
}

input{
width:100%;
}

}

</style>
</head>




<body>

    <audio id="bgMusic" loop preload="auto">
<source src="song.mp3" type="audio/mpeg">
</audio>
<div class="main">
    <div class="form-box" id="formBox">

<h2>We Invite You to the Engagement of <br>Vishwa & Rashmi</h2>

<input id="name" placeholder="Your Name, Beautifully"><br> <br>
<!-- <input id="phone" placeholder="WhatsApp Number"><br> -->

<button onclick="generate()">View Invitation</button>
</div>

<div id="card" class="card">
<h1>💍 Engagement Invitation</h1>

<p>You are warmly invited</p>
<h2 id="guestName"></h2>

<p>to celebrate the engagement of</p>
<h3>Vishwanath ❤️ Rashmi</h3>

<p> <b>5<sup>th</sup> March 2026,</b> </p>
<p> <b> 11:00AM </b> </p>
<p> <b>📍 Country Club, Shivamogga </b> </p>

<br>

<a id="mapLink" target="_blank">
<button>View Location</button>
</a>

</a>
</div>
    
</div>




<script>

    const params = new URLSearchParams(window.location.search);

const name = params.get("name");
// const phone = params.get("phone");

if(name){
document.getElementById("guestName").innerText=name;
document.getElementById("card").style.display="block";

let msg=`Hi ${name}, you are invited to our engagement ceremony 💍

📍 Venue: Country Club Shivamogga
https://maps.google.com/?q=Country+Club+Shivamogga`;

// document.getElementById("waLink").href=
// `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

document.getElementById("mapLink").href=
"https://maps.google.com/?q=Country+Club+Shivamogga";
}



/* GENERATE INVITATION */

function generate(){

let name=document.getElementById("name").value;
// let phone=document.getElementById("phone").value;

if(name===""){
alert("Enter your name");
return;
}

document.getElementById("formBox").style.display="none";

/* GENERATE PETALS */
for(let i=0;i<25;i++){
let petal=document.createElement("div");
petal.className="petal";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";
petal.style.opacity=Math.random();
document.body.appendChild(petal);
}

document.getElementById("guestName").innerText=name;
document.getElementById("card").style.display="block";

/* WhatsApp message */
let locationLink="https://maps.google.com/?q=Country+Club+Shivamogga";

let msg=`Hi ${name}, you are invited to our engagement ceremony 💍

📍 Venue: Country Club Shivamogga
Location Link:
${locationLink}`;



let music=document.getElementById("bgMusic");
music.currentTime=0;
music.play();



/* Google Maps link */
document.getElementById("mapLink").href=
"https://maps.google.com/?q=Country+Club+Shivamogga";
}
</script>

</body>
</html>
