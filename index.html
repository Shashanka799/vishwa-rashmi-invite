<!DOCTYPE html>
<html>
<head>
    
<meta charset="UTF-8">
<title>Engagement Invitation</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
<style>

    body {
background: linear-gradient(135deg,#ffe0ec,#fff);
background-size: 200% 200%;
animation: gradientMove 8s ease infinite;
}

@keyframes gradientMove {
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ffe0ec,#fff);
overflow-x:hidden;
text-align:center;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* PETALS */
.petal{
position:fixed;
top:-10px;
width:20px;
height:20px;
background:pink;
border-radius:50% 50% 50% 0;
opacity:.7;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

.main{
width:100%;
padding:20px;
}



input{
padding:12px;
margin:10px 0;
width:90%;
max-width:260px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

    .locationBtn{
display:inline-block;
padding:12px 25px;
border-radius:8px;
background:linear-gradient(45deg,#ff4d6d,#ff758f);
color:white;
text-decoration:none;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.locationBtn:hover{
transform:scale(1.05);
box-shadow:0 0 15px pink;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff4d6d,#ff758f);
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px pink;
}



@keyframes zoom{
from{transform:scale(.4);opacity:0}
to{transform:scale(1);opacity:1}
}

/* TEXT */
h1{color:#e63946;font-size:26px;}
h2{color:#444;font-size:20px;}
h3{font-size:20px;}
p{color:#555;font-size:16px;}

/* MOBILE FIX */
@media(max-width:600px){

body{
padding:15px;
align-items:center;
}

h1{font-size:22px;}
h2{font-size:18px;}
h3{font-size:18px;}
p{font-size:15px;}

button{
width:100%;
}

input{
width:100%;
}

}

</style>
</head>




<body>

<audio id="bgMusic" loop preload="auto" playsinline>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

<div class="col-12 col-sm-10 col-md-6 col-lg-5">

<!-- FORM CARD -->
<div class="card shadow-lg p-4 rounded-4 text-center animate__animated animate__fadeInDown" id="formBox">

<h4 class="mb-3">We Invite You to the Engagement of <br> Vishwa & Rashmi</h4>

<input id="name" class="form-control mb-3 w-100 mx-auto" placeholder="Type Your Name">

<button class="btn btn-danger w-100 w-50 mx-auto" onclick="generate()">
View Invitation
</button>



</div>

<!-- INVITATION CARD -->
<div id="card" class="card shadow-lg p-4 rounded-4 text-center animate__animated" style="display:none;">

<h3 class="text-danger">💍 Engagement Invitation</h3>

<p>You are warmly invited</p>
<h4 id="guestName" class="fw-bold"></h4>

<p>to celebrate the engagement of</p>
<h5>Vishwanath ❤️ Rashmi</h5>

<p><b>5<sup>th</sup> March 2026</b></p>
<p><b>11:00 AM Onwards</b></p>
<p><b>📍 Country Club, Shivamogga</b></p>

<a id="mapLink" target="_blank" onclick="stopMusic()" class="btn btn-outline-danger w-100 mt-3">
View Location
</a>

</div>

</div>
</div>




<script>

    const params = new URLSearchParams(window.location.search);

const name = params.get("name");
// const phone = params.get("phone");

    function stopMusic(){
let music=document.getElementById("bgMusic");
music.pause();
music.currentTime=0;
}

if(name){
document.getElementById("guestName").innerText=name;
let card = document.getElementById("card");
card.style.display="block";
card.classList.add("animate__fadeInUp");

let msg=`Hi ${name}, you are invited to our engagement ceremony 💍

📍 Venue: Country Club Shivamogga
https://maps.google.com/?q=Country+Club+Shivamogga`;

// document.getElementById("waLink").href=
// `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

document.getElementById("mapLink").href=
"https://maps.google.com/?q=Country+Club+Shivamogga";
}



/* GENERATE INVITATION */

function generate(){

let name=document.getElementById("name").value;
// let phone=document.getElementById("phone").value;

if(name===""){
alert("Enter your name");
return;
}

document.getElementById("formBox").style.display="none";

/* GENERATE PETALS */
for(let i=0;i<25;i++){
let petal=document.createElement("div");
petal.className="petal";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";
petal.style.opacity=Math.random();
document.body.appendChild(petal);
}

document.getElementById("guestName").innerText=name;
document.getElementById("card").style.display="block";

/* WhatsApp message */
let locationLink="https://maps.google.com/?q=Country+Club+Shivamogga";

let msg=`Hi ${name}, you are invited to our engagement ceremony 💍

📍 Venue: Country Club Shivamogga
Location Link:
${locationLink}`;



let music = document.getElementById("bgMusic");
music.currentTime = 0;

music.play().then(() => {
    console.log("Music playing");
}).catch(error => {
    console.log("Playback blocked:", error);
});


/* Google Maps link */
document.getElementById("mapLink").href=
"https://maps.google.com/?q=Country+Club+Shivamogga";
}
</script>

</body>
</html>
